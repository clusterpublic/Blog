<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Manager - Cluster Protocol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;500;600;700&family=Pliant:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/styles/white-theme.css">
</head>
<body>
    <!-- Header will be loaded by header-loader.js -->
    
    <div class="container">
        <h1 class="page-title">Blog Manager</h1>
        <p class="page-subtitle">Create, edit, and manage blog posts</p>

        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="Search blogs…">
            <select id="statusFilter" class="filter-select">
                <option value="">All statuses</option>
                <option value="published">Published (live)</option>
                <option value="scheduled">Scheduled</option>
                <option value="draft">Draft</option>
                <option value="hidden">Hidden</option>
            </select>
            <a href="/editor" class="btn btn-primary"><i data-lucide="plus"></i> New blog</a>
            <button onclick="refreshBlogs()" class="btn btn-secondary"><i data-lucide="refresh-cw"></i> Refresh</button>
        </div>
        
        <div class="stats" id="statsContainer">
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="files"></i></div>
                <div class="stat-content">
                    <div class="stat-number" id="totalBlogs">-</div>
                    <div class="stat-label">Total blogs</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="book-open"></i></div>
                <div class="stat-content">
                    <div class="stat-number" id="currentPage">-</div>
                    <div class="stat-label">Current page</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="layers"></i></div>
                <div class="stat-content">
                    <div class="stat-number" id="totalPages">-</div>
                    <div class="stat-label">Total pages</div>
                </div>
            </div>
        </div>
        
        <div id="loadingIndicator" class="loading">
            <p>Loading blogs...</p>
        </div>
        
        <div id="blogGrid" class="blog-grid" style="display: none;">
            <!-- Blog cards will be inserted here -->
        </div>
        
        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-state-icon"><i data-lucide="file-text"></i></div>
            <h3>No blogs found</h3>
            <p>Create your first blog post to get started.</p>
            <a href="/editor" class="btn btn-primary"><i data-lucide="plus"></i> New blog</a>
        </div>
        
        <div id="pagination" class="pagination" style="display: none;">
            <!-- Pagination buttons will be inserted here -->
        </div>
    </div>
    
    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
        <div class="modal-content confirm-dialog">
            <div class="modal-header">
                <h2 id="deleteModalTitle" class="modal-title"><i data-lucide="trash-2"></i> Delete blog</h2>
                <button type="button" class="modal-close" onclick="closeDeleteModal()" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body">
                <p class="confirm-dialog-message">Are you sure you want to delete this blog? <strong>This action cannot be undone.</strong></p>
            </div>
            <div class="modal-actions">
                <button type="button" onclick="closeDeleteModal()" class="btn btn-secondary btn-small">Cancel</button>
                <button type="button" onclick="confirmDelete()" class="btn btn-danger btn-small"><i data-lucide="trash-2"></i> Delete</button>
            </div>
        </div>
    </div>
    
    <script src="/components/header-loader.js"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let totalBlogs = 0;
        let blogsPerPage = 12;
        let searchTerm = '';
        let statusFilter = '';
        let deleteBlogId = null;
        
        // Load blogs on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadBlogs();
            
            // Setup search functionality
            const searchInput = document.getElementById('searchInput');
            let searchTimeout;
            
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    searchTerm = this.value;
                    currentPage = 1;
                    loadBlogs();
                }, 500);
            });

            document.getElementById('statusFilter').addEventListener('change', function() {
                statusFilter = this.value;
                currentPage = 1;
                loadBlogs();
            });
        });
        
        async function loadBlogs() {
            try {
                showLoading(true);
                statusFilter = document.getElementById('statusFilter').value;
                
                const statusParam = statusFilter ? `&status=${encodeURIComponent(statusFilter)}` : '';
                const response = await fetch(`/api/get_all_blogs?page=${currentPage}&per_page=${blogsPerPage}&search=${encodeURIComponent(searchTerm)}${statusParam}`);
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                totalBlogs = data.total;
                totalPages = data.total_pages;
                currentPage = data.page;
                
                updateStats();
                renderBlogs(data.blogs);
                renderPagination();
                window.refreshIcons?.();
                
            } catch (error) {
                console.error('Error loading blogs:', error);
                showError('Failed to load blogs. Please try again.');
            } finally {
                showLoading(false);
            }
        }
        
        function updateStats() {
            document.getElementById('totalBlogs').textContent = totalBlogs;
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('totalPages').textContent = totalPages;
        }
        
        function renderBlogs(blogs) {
            const blogGrid = document.getElementById('blogGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (blogs.length === 0) {
                blogGrid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            blogGrid.style.display = 'grid';
            
            blogGrid.innerHTML = blogs.map(blog => {
                const displayStatus = blog.display_status || 'published';
                const canOpenArticle = displayStatus === 'published' || displayStatus === 'draft';
                const liveUrl = `https://www.clusterprotocol.ai/blog/${blog.blog_id}`;
                const publishLabel = blog.publish_date
                    ? new Date(blog.publish_date * 1000).toLocaleString()
                    : new Date(blog.timestamp * 1000).toLocaleDateString();

                return `
                <article class="blog-card">
                    <img src="${blog.thumbnail || 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzUwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMWExYTFhIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCwgc2Fucy1zZXJpZiIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPk5vIFRodW1ibmFpbDwvdGV4dD48L3N2Zz4='}" 
                         alt="${blog.title}" class="blog-thumbnail" 
                         onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzUwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMWExYTFhIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCwgc2Fucy1zZXJpZiIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPk5vIFRodW1ibmFpbDwvdGV4dD48L3N2Zz4='">
                    <div class="blog-content">
                        <div class="blog-card-meta-row">
                            <span class="status-badge ${displayStatus}">${displayStatus}</span>
                            <time class="blog-date">${publishLabel}</time>
                        </div>
                        <h3 class="blog-title">
                            <a href="/editor/${blog.blog_id}" class="blog-title-link">${blog.title}</a>
                        </h3>
                        <p class="blog-description">${blog.description || ''}</p>
                        ${canOpenArticle
                            ? `<a href="${liveUrl}" target="_blank" rel="noopener noreferrer" class="blog-live-link"><i data-lucide="external-link"></i> Open article</a>`
                            : `<p class="blog-id" title="${blog.blog_id}">${blog.blog_id}</p>`}
                    </div>
                    <footer class="card-footer blog-card-footer">
                        <a href="/editor/${blog.blog_id}" class="btn btn-small btn-secondary"><i data-lucide="pencil"></i> Edit</a>
                        <span class="card-footer-spacer"></span>
                        ${canOpenArticle ? `<a href="${liveUrl}" target="_blank" rel="noopener noreferrer" class="btn btn-small btn-ghost btn-icon" title="Open article"><i data-lucide="external-link"></i></a>` : ''}
                        <button onclick="openDeleteModal('${blog.blog_id}')" class="btn btn-small btn-ghost btn-icon btn-danger-ghost" title="Delete"><i data-lucide="trash-2"></i></button>
                    </footer>
                </article>
            `}).join('');
        }
        
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.style.display = 'none';
                return;
            }
            
            pagination.style.display = 'flex';
            
            let paginationHTML = '';
            
            // Previous button
            paginationHTML += `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Previous</button>`;
            
            // Page numbers
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            
            if (startPage > 1) {
                paginationHTML += `<button onclick="changePage(1)">1</button>`;
                if (startPage > 2) {
                    paginationHTML += `<span>...</span>`;
                }
            }
            
            for (let i = startPage; i <= endPage; i++) {
                paginationHTML += `<button onclick="changePage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    paginationHTML += `<span>...</span>`;
                }
                paginationHTML += `<button onclick="changePage(${totalPages})">${totalPages}</button>`;
            }
            
            // Next button
            paginationHTML += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>`;
            
            pagination.innerHTML = paginationHTML;
        }
        
        function changePage(page) {
            if (page >= 1 && page <= totalPages && page !== currentPage) {
                currentPage = page;
                loadBlogs();
            }
        }
        
        function refreshBlogs() {
            currentPage = 1;
            searchTerm = '';
            statusFilter = '';
            document.getElementById('searchInput').value = '';
            document.getElementById('statusFilter').value = '';
            loadBlogs();
        }

        function getLiveBlogUrl(blogId) {
            return `https://www.clusterprotocol.ai/blog/${blogId}`;
        }

        function viewBlog(blogId) {
            window.open(getLiveBlogUrl(blogId), '_blank', 'noopener,noreferrer');
        }
        
        function openDeleteModal(blogId) {
            deleteBlogId = blogId;
            document.getElementById('deleteModal').classList.add('open');
            window.refreshIcons?.();
        }

        function closeDeleteModal() {
            deleteBlogId = null;
            document.getElementById('deleteModal').classList.remove('open');
        }
        
        async function confirmDelete() {
            if (!deleteBlogId) return;
            
            try {
                const password = AdminPassword.require();
                if (!password) return;
                
                const response = await fetch(`/api/delete_blog/${deleteBlogId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ password: password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Blog deleted successfully!');
                    closeDeleteModal();
                    loadBlogs(); // Refresh the list
                } else {
                    alert('Error: ' + data.message);
                }
                
            } catch (error) {
                console.error('Error deleting blog:', error);
                alert('Failed to delete blog. Please try again.');
            }
        }
        
        function showLoading(show) {
            document.getElementById('loadingIndicator').style.display = show ? 'block' : 'none';
            document.getElementById('blogGrid').style.display = show ? 'none' : 'grid';
        }
        
        function showError(message) {
            alert(message);
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('deleteModal');
            if (event.target === modal) {
                closeDeleteModal();
            }
        }
    </script>
</body>
</html>
