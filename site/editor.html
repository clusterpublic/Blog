<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Editor - Cluster Protocol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;500;600;700&family=Pliant:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/styles/white-theme.css">
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.js"></script>
    <script src="/js/admin-password.js"></script>
    <script src="/js/admin-confirm.js"></script>
    <script src="/js/blog-content-format.js"></script>
    <script src="/js/blog-quill-editor.js"></script>
</head>

<body class="editor-page">
    <header class="editor-topbar">
        <div class="editor-topbar-left">
            <a href="/manager" class="btn btn-ghost btn-small btn-icon" title="Back to manager"><i data-lucide="arrow-left"></i></a>
            <div class="header-title-group">
                <i data-lucide="pen-line" class="icon-lg"></i>
                <h1>Blog Editor</h1>
            </div>
        </div>
        <div class="editor-topbar-actions">
            <a id="viewPublishedBtn" href="#" target="_blank" rel="noopener noreferrer" class="btn btn-secondary btn-small hidden"><i data-lucide="external-link"></i> View Published Article</a>
            <button id="saveDraftBtn" onclick="saveBlog()" class="btn btn-secondary btn-small"><i data-lucide="file"></i> Save draft</button>
            <button id="saveHiddenBtn" onclick="saveBlog()" class="btn btn-secondary btn-small hidden"><i data-lucide="eye-off"></i> Save hidden</button>
            <button id="publishBtn" onclick="saveBlog()" class="btn btn-primary btn-small hidden"><i data-lucide="send"></i> Publish</button>
        </div>
    </header>

    <div class="container editor-layout">
        <div class="editor-meta-panel">
            <div id="errorMessage" class="error hidden"></div>
            <div id="successMessage" class="success hidden"></div>

            <div class="form-group">
                <label class="form-label" for="blogTitle">Blog Title</label>
                <input type="text" id="blogTitle" class="form-input" placeholder="Enter your blog title...">
            </div>

            <div class="form-group">
                <label class="form-label" for="blogDescription">Short Description</label>
                <input type="text" id="blogDescription" class="form-input"
                    placeholder="Enter a 20-30 word description...">
            </div>

            <div class="form-group">
                <label class="form-label" for="blogThumbnail">Thumbnail URL</label>
                <div class="thumbnail-input-row">
                    <input type="text" id="blogThumbnail" class="form-input" placeholder="Enter thumbnail image URL...">
                    <div class="thumbnail-preview-wrap" id="thumbnailPreviewWrap">
                        <img id="thumbnailPreview" class="thumbnail-preview hidden" alt="Thumbnail preview">
                        <span id="thumbnailPreviewPlaceholder" class="thumbnail-preview-placeholder">No image</span>
                    </div>
                </div>
            </div>

            <div class="form-group publish-settings">
                <div>
                    <label class="form-label" for="blogStatus">Status</label>
                    <select id="blogStatus" class="form-input" onchange="updateStatusIndicator(); updateSaveButton(); updateViewPublishedButton();">
                        <option value="draft">Draft</option>
                        <option value="published">Published</option>
                        <option value="hidden">Hidden</option>
                    </select>
                </div>
                <div>
                    <label class="form-label" for="publishDate">Publish Date (optional schedule)</label>
                    <input type="datetime-local" id="publishDate" class="form-input" onchange="updateStatusIndicator(); updateViewPublishedButton();">
                    <small class="form-hint">Leave empty to publish immediately. Future dates stay hidden from public lists until then.</small>
                </div>
            </div>
        </div>

        <div class="editor-content-panel">
            <div class="editor-content-header">
                <div class="panel-title">
                    <span class="status-indicator status-draft"></span>
                    Content
                </div>
                <div id="editorToolbar" class="formatting-toolbar">
                    <select id="headerFormat" class="format-select" title="Text style">
                        <option value="">Normal</option>
                        <option value="2">Heading</option>
                    </select>
                    <span class="format-divider"></span>
                    <button type="button" class="format-btn" data-format="bold" title="Bold"><i data-lucide="bold"></i></button>
                    <button type="button" class="format-btn" data-format="italic" title="Italic"><i data-lucide="italic"></i></button>
                    <button type="button" class="format-btn" data-format="underline" title="Underline"><i data-lucide="underline"></i></button>
                    <span class="format-divider"></span>
                    <button type="button" class="format-btn" data-format="link" title="Link"><i data-lucide="link"></i></button>
                    <button type="button" class="format-btn" data-format="image" title="Image"><i data-lucide="image"></i></button>
                    <button type="button" class="format-btn" data-format="blockquote" title="Quote"><i data-lucide="quote"></i></button>
                    <button type="button" class="format-btn" data-format="code-block" title="Code"><i data-lucide="code"></i></button>
                    <button type="button" class="format-btn" data-format="list" title="Bullet list"><i data-lucide="list"></i></button>
                    <span class="format-divider"></span>
                    <button type="button" class="format-btn" data-format="clean" title="Clear formatting"><i data-lucide="eraser"></i></button>
                </div>
            </div>
            <!-- Hidden Quill toolbar — required for default link popover -->
            <div id="quillLinkToolbarHost" class="quill-link-toolbar-host hidden" aria-hidden="true">
                <span class="ql-formats"><button type="button" class="ql-link"></button></span>
            </div>
            <div id="quillEditor" class="quill-editor"></div>
            <textarea id="blogContent" class="hidden" aria-hidden="true" tabindex="-1"></textarea>
        </div>
    </div>

    <script>
        let currentBlogId = null;
        let isEditing = false;

        // Check if we're editing an existing blog
        document.addEventListener('DOMContentLoaded', function () {
            if (!AdminPassword.guard()) return;

            BlogQuillEditor.init();
            window.refreshIcons?.();

            updateStatusIndicator();
            updateSaveButton();
            updateViewPublishedButton();
            document.getElementById('blogThumbnail')?.addEventListener('input', updateThumbnailPreview);
            updateThumbnailPreview();
            const pathParts = window.location.pathname.split('/');
            if (pathParts.length > 2 && pathParts[1] === 'editor') {
                currentBlogId = pathParts[2];
                isEditing = true;
                loadBlogForEdit();
            }
        });

        async function loadBlogForEdit() {
            try {
                showLoading(true);
                const response = await fetch(`/api/get_blog_for_edit/${currentBlogId}`);
                const data = await response.json();

                if (data.success) {
                    const blog = data.blog;
                    document.getElementById('blogTitle').value = blog.title || '';
                    document.getElementById('blogDescription').value = blog.description || '';
                    document.getElementById('blogThumbnail').value = blog.thumbnail || '';
                    BlogQuillEditor.setFromMarkdown(blog.content || '');
                    document.getElementById('blogStatus').value = blog.status || 'published';

                    if (blog.publish_date) {
                        document.getElementById('publishDate').value = toDatetimeLocalValue(blog.publish_date);
                    }

                    updateStatusIndicator();
                    updateSaveButton();
                    updateThumbnailPreview();
                    showSuccess('Blog loaded for editing');
                } else {
                    showError('Failed to load blog: ' + data.message);
                }
            } catch (error) {
                console.error('Error loading blog:', error);
                showError('Failed to load blog. Please try again.');
            } finally {
                showLoading(false);
            }
        }

        function updateThumbnailPreview() {
            const url = document.getElementById('blogThumbnail')?.value.trim() || '';
            const img = document.getElementById('thumbnailPreview');
            const placeholder = document.getElementById('thumbnailPreviewPlaceholder');
            if (!img || !placeholder) return;

            if (!url) {
                img.classList.add('hidden');
                img.removeAttribute('src');
                placeholder.textContent = 'No image';
                placeholder.classList.remove('hidden');
                return;
            }

            img.onload = () => {
                img.classList.remove('hidden');
                placeholder.classList.add('hidden');
            };
            img.onerror = () => {
                img.classList.add('hidden');
                placeholder.textContent = 'Invalid URL';
                placeholder.classList.remove('hidden');
            };
            placeholder.textContent = 'Loading…';
            placeholder.classList.remove('hidden');
            img.classList.add('hidden');
            img.src = url;
        }

        async function saveBlog() {
            const blogData = getBlogData();

            if (blogData.status === 'published') {
                if (!blogData.title || !blogData.description || !blogData.thumbnail || !blogData.content) {
                    showError('Please fill in all fields (title, description, thumbnail, and content) to publish.');
                    return;
                }
            } else if (!blogData.title) {
                showError('Please add at least a title to save.');
                return;
            }

            const actionLabel =
                blogData.status === 'draft' ? 'save draft' :
                blogData.status === 'hidden' ? 'save as hidden' :
                'publish blog';

            const password = AdminPassword.require();
            if (!password) return;

            try {
                showLoading(true);

                if (isEditing) {
                    const response = await fetch(`/api/update_blog/${currentBlogId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...blogData, password }),
                    });

                    const data = await response.json();
                    if (data.success) {
                        showSuccess(
                            blogData.status === 'draft' ? 'Draft saved!' :
                            blogData.status === 'hidden' ? 'Saved as hidden!' :
                            'Blog updated successfully!'
                        );
                        setTimeout(() => { window.location.href = '/manager'; }, 1000);
                    } else {
                        showError('Error: ' + data.message);
                    }
                } else {
                    const response = await fetch('/upload_blog', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({ ...blogData, password }),
                    });

                    const data = await response.json();
                    if (data.success) {
                        showSuccess(
                            blogData.status === 'draft' ? 'Draft saved!' :
                            blogData.status === 'hidden' ? 'Saved as hidden!' :
                            'Blog published successfully!'
                        );
                        setTimeout(() => { window.location.href = '/manager'; }, 200);
                    } else {
                        showError('Error: ' + data.message);
                    }
                }
            } catch (error) {
                console.error('Error saving blog:', error);
                showError('Failed to save blog. Please try again.');
            } finally {
                showLoading(false);
            }
        }

        function getBlogData() {
            const status = document.getElementById('blogStatus').value;
            const publishDateInput = document.getElementById('publishDate').value;
            const data = {
                title: document.getElementById('blogTitle').value,
                description: document.getElementById('blogDescription').value,
                thumbnail: document.getElementById('blogThumbnail').value,
                content: BlogQuillEditor.getMarkdown(),
                status,
            };
            if (publishDateInput) {
                data.publish_date = new Date(publishDateInput).toISOString();
            }
            return data;
        }

        function toDatetimeLocalValue(unixSeconds) {
            const date = new Date(unixSeconds * 1000);
            const offset = date.getTimezoneOffset();
            const local = new Date(date.getTime() - offset * 60000);
            return local.toISOString().slice(0, 16);
        }

        function updateSaveButton() {
            const status = document.getElementById('blogStatus').value;
            document.getElementById('saveDraftBtn').classList.toggle('hidden', status !== 'draft');
            document.getElementById('saveHiddenBtn').classList.toggle('hidden', status !== 'hidden');
            document.getElementById('publishBtn').classList.toggle('hidden', status !== 'published');
            updateViewPublishedButton();
            window.refreshIcons?.();
        }

        function updateViewPublishedButton() {
            const viewBtn = document.getElementById('viewPublishedBtn');
            if (!viewBtn) return;

            const status = document.getElementById('blogStatus').value;
            const publishDateInput = document.getElementById('publishDate').value;
            let isScheduled = false;

            if (status === 'published' && publishDateInput) {
                isScheduled = new Date(publishDateInput).getTime() > Date.now();
            }

            const canView = Boolean(currentBlogId) && status === 'published' && !isScheduled;
            viewBtn.classList.toggle('hidden', !canView);

            if (canView) {
                viewBtn.href = `https://www.clusterprotocol.ai/blog/${currentBlogId}`;
            } else {
                viewBtn.removeAttribute('href');
            }

            window.refreshIcons?.();
        }

        function updateStatusIndicator() {
            const status = document.getElementById('blogStatus').value;
            const publishDateInput = document.getElementById('publishDate').value;
            let displayStatus = status;

            if (status === 'published' && publishDateInput) {
                const publishTime = new Date(publishDateInput).getTime();
                if (publishTime > Date.now()) displayStatus = 'scheduled';
            }

            document.querySelectorAll('.status-indicator').forEach((el) => {
                el.className = 'status-indicator status-' + displayStatus;
            });
        }
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');

            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.remove('hidden');

            setTimeout(() => {
                successDiv.classList.add('hidden');
            }, 3000);
        }

        function showLoading(show) {
            // You can implement a loading indicator here
            console.log('Loading:', show);
        }

    </script>
    <script src="/components/header-loader.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => setTimeout(() => window.refreshIcons?.(), 150));
    </script>
</body>

</html>
