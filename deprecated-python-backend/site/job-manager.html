<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Manager - Cluster Protocol</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="/styles/clay-theme.css">
</head>
<body>
    <!-- Header will be loaded by header-loader.js -->

    <div class="container">
        <h1 class="page-title">Job Manager</h1>
        <p class="page-subtitle">Manage job postings and view applications</p>

        <!-- Tab Navigation -->
        <div class="tab-navigation">
            <button class="tab-btn active" onclick="switchTab('jobs')">Jobs</button>
            <button class="tab-btn" onclick="switchTab('applications')">Applications</button>
        </div>

        <!-- Jobs Tab Content -->
        <div id="jobsTab" class="tab-content active">
            <div class="controls">
                <div class="filters">
                    <input type="text" class="search-box" id="searchInput" placeholder="Search jobs by role, location, or description...">
                    <select class="filter-select" id="typeFilter">
                        <option value="">All Types</option>
                        <option value="fulltime">Full-time</option>
                        <option value="intern">Intern</option>
                        <option value="advisory">Advisory</option>
                        <option value="parttime">Part-time</option>
                        <option value="contract">Contract</option>
                    </select>
                    <select class="filter-select" id="roleFilter">
                        <option value="">All Roles</option>
                        <option value="product">Product</option>
                        <option value="design">Design</option>
                        <option value="tech">Tech</option>
                        <option value="management">Management</option>
                        <option value="social">Social</option>
                        <option value="marketing">Marketing</option>
                        <option value="sales">Sales</option>
                    </select>
                </div>
                <button class="btn" onclick="openCreateModal()">Create New Job</button>
            </div>

            <div id="jobContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading Jobs...
                </div>
            </div>

            <div class="pagination" id="pagination" style="display: none;">
                <!-- Pagination buttons will be generated here -->
            </div>
        </div>

        <!-- Applications Tab Content -->
        <div id="applicationsTab" class="tab-content">
            <div class="controls">
                <div class="filters">
                    <input type="text" class="search-box" id="applicationSearchInput" placeholder="Search applications by name, email, or education...">
                    <select class="filter-select" id="statusFilter">
                        <option value="">All Status</option>
                        <option value="submitted">Submitted</option>
                        <option value="reviewed">Reviewed</option>
                        <option value="accepted">Accepted</option>
                        <option value="rejected">Rejected</option>
                    </select>
                    <select class="filter-select" id="educationFilter">
                        <option value="">All Education</option>
                        <option value="high-school">High School</option>
                        <option value="associate">Associate</option>
                        <option value="bachelor">Bachelor</option>
                        <option value="master">Master</option>
                        <option value="phd">PhD</option>
                        <option value="other">Other</option>
                    </select>
                    <select class="filter-select" id="jobFilter">
                        <option value="">All Jobs</option>
                        <!-- Job options will be loaded dynamically -->
                    </select>
                </div>
                <button class="btn btn-secondary" onclick="loadApplications()">Refresh Applications</button>
            </div>

            <div id="applicationContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading Applications...
                </div>
            </div>

            <div class="pagination" id="applicationPagination" style="display: none;">
                <!-- Application pagination buttons will be generated here -->
            </div>
        </div>
    </div>

    <!-- Create/Edit Job Modal -->
    <div class="modal" id="jobModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Create Job</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            
            <form id="jobForm">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="jobRoleName">Role Name</label>
                        <input type="text" class="form-input" id="jobRoleName" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="jobLocation">Location</label>
                        <input type="text" class="form-input" id="jobLocation" placeholder="e.g., Remote, San Francisco, New York" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="jobType">Type</label>
                        <select class="form-select" id="jobType" required>
                            <option value="">Select Type</option>
                            <option value="fulltime">Full-time</option>
                            <option value="intern">Intern</option>
                            <option value="advisory">Advisory</option>
                            <option value="parttime">Part-time</option>
                            <option value="contract">Contract</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="jobRoleCategory">Role Category</label>
                        <select class="form-select" id="jobRoleCategory" required>
                            <option value="">Select Category</option>
                            <option value="product">Product</option>
                            <option value="design">Design</option>
                            <option value="tech">Tech</option>
                            <option value="management">Management</option>
                            <option value="social">Social</option>
                            <option value="marketing">Marketing</option>
                            <option value="sales">Sales</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="jobDescription">Description</label>
                    <textarea class="form-textarea" id="jobDescription" placeholder="Describe the role, responsibilities, requirements, and benefits..." required></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="jobIsActive" checked> Active Job Posting
                    </label>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="jobPassword">Password</label>
                    <input type="password" class="form-input" id="jobPassword" required placeholder="Enter admin password">
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn" id="submitBtn">Create Job</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/components/header-loader.js"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let currentJobId = null;
        let searchTimeout;
        
        // Application-related variables
        let currentApplicationPage = 1;
        let totalApplicationPages = 1;
        let currentTab = 'jobs';

        // Load jobs on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadJobs();
            
            // Setup search and filters for jobs
            document.getElementById('searchInput').addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    currentPage = 1;
                    loadJobs();
                }, 300);
            });
            
            document.getElementById('typeFilter').addEventListener('change', function() {
                currentPage = 1;
                loadJobs();
            });
            
            document.getElementById('roleFilter').addEventListener('change', function() {
                currentPage = 1;
                loadJobs();
            });
            
            // Setup search and filters for applications
            document.getElementById('applicationSearchInput').addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    currentApplicationPage = 1;
                    loadApplications();
                }, 300);
            });
            
            document.getElementById('statusFilter').addEventListener('change', function() {
                currentApplicationPage = 1;
                loadApplications();
            });
            
            document.getElementById('educationFilter').addEventListener('change', function() {
                currentApplicationPage = 1;
                loadApplications();
            });
            
            document.getElementById('jobFilter').addEventListener('change', function() {
                currentApplicationPage = 1;
                loadApplications();
            });
            
            // Load job options for the filter
            loadJobOptions();
        });

        // Tab switching functionality
        function switchTab(tabName) {
            currentTab = tabName;
            
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
            
            // Update tab content
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`${tabName}Tab`).classList.add('active');
            
            // Load appropriate data
            if (tabName === 'jobs') {
                loadJobs();
            } else if (tabName === 'applications') {
                loadApplications();
            }
        }

        async function loadJobs() {
            const searchQuery = document.getElementById('searchInput').value;
            const typeFilter = document.getElementById('typeFilter').value;
            const roleFilter = document.getElementById('roleFilter').value;
            const container = document.getElementById('jobContainer');
            
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading Jobs...
                </div>
            `;

            try {
                const params = new URLSearchParams({
                    page: currentPage,
                    per_page: 10
                });
                
                if (searchQuery) params.append('search', searchQuery);
                if (typeFilter) params.append('type', typeFilter);
                if (roleFilter) params.append('role_category', roleFilter);

                const response = await fetch(`/api/admin/jobs?${params}`);
                const data = await response.json();

                if (response.ok) {
                    displayJobs(data.jobs);
                    updatePagination(data.page, data.total_pages);
                } else {
                    throw new Error(data.error || 'Failed to load jobs');
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-title">Error Loading Jobs</div>
                        <div class="empty-state-text">${error.message}</div>
                        <button class="btn btn-primary" onclick="loadJobs()">Retry</button>
                    </div>
                `;
            }
        }

        function displayJobs(jobs) {
            const container = document.getElementById('jobContainer');
            
            if (jobs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💼</div>
                        <div class="empty-state-title">No Jobs Found</div>
                        <div class="empty-state-text">Create your first job posting to get started</div>
                        <button class="btn btn-primary" onclick="openCreateModal()">Create Job</button>
                    </div>
                `;
                return;
            }

            const jobHTML = jobs.map(job => `
                <div class="job-card ${!job.is_active ? 'opacity-60' : ''}">
                    <div class="job-header">
                        <h3 class="job-title">${escapeHtml(job.role_name)}</h3>
                        <div class="job-actions">
                            <button class="btn btn-secondary btn-small" onclick="editJob('${job._id}')">Edit</button>
                            <button class="btn btn-small ${job.is_active ? 'btn-danger' : 'btn-success'}" onclick="toggleJobStatus('${job._id}', ${job.is_active})">
                                ${job.is_active ? 'Deactivate' : 'Activate'}
                            </button>
                            <button class="btn btn-danger btn-small" onclick="deleteJob('${job._id}')">Delete</button>
                        </div>
                    </div>
                    
                    <div class="job-meta">
                        <span class="job-badge badge-type">${job.type}</span>
                        <span class="job-badge badge-role">${job.role_category}</span>
                        <span class="job-badge badge-location">${escapeHtml(job.location)}</span>
                        ${!job.is_active ? '<span class="job-badge badge-inactive">Inactive</span>' : ''}
                    </div>
                    
                    <p class="job-description">${escapeHtml(job.description)}</p>
                    
                    <div class="job-footer">
                        <span>Created: ${new Date(job.created_at).toLocaleDateString()}</span>
                        <span>Updated: ${new Date(job.updated_at).toLocaleDateString()}</span>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `<div class="job-grid">${jobHTML}</div>`;
        }

        function updatePagination(page, totalPagesParam) {
            const pagination = document.getElementById('pagination');
            
            if (totalPagesParam <= 1) {
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'flex';
            currentPage = page;
            totalPages = totalPagesParam;

            let paginationHTML = '';

            // Previous button
            paginationHTML += `
                <button class="pagination-btn" ${page === 1 ? 'disabled' : ''} onclick="changePage(${page - 1})">
                    Previous
                </button>
            `;

            // Page numbers
            for (let i = Math.max(1, page - 2); i <= Math.min(totalPagesParam, page + 2); i++) {
                paginationHTML += `
                    <button class="pagination-btn ${i === page ? 'active' : ''}" onclick="changePage(${i})">
                        ${i}
                    </button>
                `;
            }

            // Next button
            paginationHTML += `
                <button class="pagination-btn" ${page === totalPagesParam ? 'disabled' : ''} onclick="changePage(${page + 1})">
                    Next
                </button>
            `;

            pagination.innerHTML = paginationHTML;
        }

        function changePage(page) {
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                loadJobs();
            }
        }

        function openCreateModal() {
            currentJobId = null;
            document.getElementById('modalTitle').textContent = 'Create Job';
            document.getElementById('submitBtn').textContent = 'Create Job';
            document.getElementById('jobForm').reset();
            document.getElementById('jobIsActive').checked = true;
            document.getElementById('jobModal').classList.add('show');
        }

        function editJob(jobId) {
            currentJobId = jobId;
            document.getElementById('modalTitle').textContent = 'Edit Job';
            document.getElementById('submitBtn').textContent = 'Update Job';
            
            // Fetch job data
            fetch(`/api/job/${jobId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.role_name) {
                        document.getElementById('jobRoleName').value = data.role_name;
                        document.getElementById('jobLocation').value = data.location;
                        document.getElementById('jobType').value = data.type;
                        document.getElementById('jobRoleCategory').value = data.role_category;
                        document.getElementById('jobDescription').value = data.description;
                        document.getElementById('jobIsActive').checked = data.is_active;
                        document.getElementById('jobModal').classList.add('show');
                    }
                })
                .catch(error => {
                    alert('Error loading job: ' + error.message);
                });
        }

        function toggleJobStatus(jobId, currentStatus) {
            const password = prompt('Enter admin password to update job status:');
            if (!password) return;
            
            const newStatus = !currentStatus;
            const action = newStatus ? 'activate' : 'deactivate';
            
            if (confirm(`Are you sure you want to ${action} this job?`)) {
                fetch(`/api/job/${jobId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        is_active: newStatus,
                        password: password
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        loadJobs();
                    } else {
                        alert('Error updating job: ' + (data.message || data.error));
                    }
                })
                .catch(error => {
                    alert('Error updating job: ' + error.message);
                });
            }
        }

        function deleteJob(jobId) {
            const password = prompt('Enter admin password to delete job:');
            if (!password) return;
            
            if (confirm('Are you sure you want to delete this job? This action cannot be undone.')) {
                fetch(`/api/job/${jobId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password: password })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        loadJobs();
                    } else {
                        alert('Error deleting job: ' + (data.message || data.error));
                    }
                })
                .catch(error => {
                    alert('Error deleting job: ' + error.message);
                });
            }
        }

        function closeModal() {
            document.getElementById('jobModal').classList.remove('show');
        }

        document.getElementById('jobForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const roleName = document.getElementById('jobRoleName').value;
            const location = document.getElementById('jobLocation').value;
            const type = document.getElementById('jobType').value;
            const roleCategory = document.getElementById('jobRoleCategory').value;
            const description = document.getElementById('jobDescription').value;
            const isActive = document.getElementById('jobIsActive').checked;
            const password = document.getElementById('jobPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';

            try {
                const url = currentJobId ? `/api/job/${currentJobId}` : '/api/job';
                const method = currentJobId ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        role_name: roleName,
                        location: location,
                        type: type,
                        role_category: roleCategory,
                        description: description,
                        is_active: isActive,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    closeModal();
                    loadJobs();
                } else {
                    throw new Error(data.error || 'Failed to save job');
                }
            } catch (error) {
                alert('Error saving job: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = currentJobId ? 'Update Job' : 'Create Job';
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Application-related functions
        async function loadJobOptions() {
            try {
                const response = await fetch('/api/admin/jobs?per_page=100');
                const data = await response.json();
                
                if (response.ok) {
                    const jobFilter = document.getElementById('jobFilter');
                    // Clear existing options except the first one
                    jobFilter.innerHTML = '<option value="">All Jobs</option>';
                    
                    data.jobs.forEach(job => {
                        const option = document.createElement('option');
                        option.value = job._id;
                        option.textContent = `${job.role_name} (${job.location})`;
                        jobFilter.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading job options:', error);
            }
        }

        async function loadApplications() {
            const searchQuery = document.getElementById('applicationSearchInput').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const educationFilter = document.getElementById('educationFilter').value;
            const jobFilter = document.getElementById('jobFilter').value;
            const container = document.getElementById('applicationContainer');
            
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading Applications...
                </div>
            `;

            try {
                const params = new URLSearchParams({
                    page: currentApplicationPage,
                    per_page: 10
                });
                
                if (searchQuery) params.append('search', searchQuery);
                if (statusFilter) params.append('status', statusFilter);
                if (educationFilter) params.append('education', educationFilter);
                if (jobFilter) params.append('job_id', jobFilter);

                const response = await fetch(`/api/admin/applications?${params}`);
                const data = await response.json();

                if (response.ok) {
                    displayApplications(data.applications);
                    updateApplicationPagination(data.page, data.total_pages);
                } else {
                    throw new Error(data.error || 'Failed to load applications');
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-title">Error Loading Applications</div>
                        <div class="empty-state-text">${error.message}</div>
                        <button class="btn btn-primary" onclick="loadApplications()">Retry</button>
                    </div>
                `;
            }
        }

        function displayApplications(applications) {
            const container = document.getElementById('applicationContainer');
            
            if (applications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <div class="empty-state-title">No Applications Found</div>
                        <div class="empty-state-text">No job applications match your current filters</div>
                        <button class="btn btn-secondary" onclick="loadApplications()">Refresh</button>
                    </div>
                `;
                return;
            }

            const applicationHTML = applications.map(app => `
                <div class="application-card">
                    <div class="application-header">
                        <div>
                            <h3 class="application-name">${escapeHtml(app.fullName)}</h3>
                            <div class="application-email">${escapeHtml(app.email)}</div>
                            ${app.jobDetails ? `
                                <div class="job-info" style="margin-top: 0.5rem; padding: 0.5rem; background: rgba(59, 130, 246, 0.1); border-radius: 0.5rem; border-left: 3px solid #3b82f6;">
                                    <div style="font-weight: 600; color: #60a5fa; margin-bottom: 0.25rem;">
                                        📋 Applied for: ${escapeHtml(app.jobDetails.role_name)}
                                    </div>
                                    <div style="font-size: 0.85rem; color: #a3a3a3;">
                                        ${escapeHtml(app.jobDetails.location)} • ${escapeHtml(app.jobDetails.type)} • ${escapeHtml(app.jobDetails.role_category)}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                        <div class="application-actions">
                            <button class="btn btn-secondary btn-small" onclick="updateApplicationStatus('${app._id}', '${app.status}')">Update Status</button>
                            <button class="btn btn-danger btn-small" onclick="deleteApplication('${app._id}')">Delete</button>
                        </div>
                    </div>
                    
                    <div class="application-meta">
                        <span class="job-badge badge-education">${capitalizeFirst(app.educationLevel)}</span>
                        <span class="job-badge badge-experience">${app.yearsExperience} years</span>
                        <span class="job-badge badge-status">${capitalizeFirst(app.status)}</span>
                    </div>
                    
                    <div class="application-links">
                        <a href="${escapeHtml(app.resumeUrl)}" target="_blank" class="application-link">📄 Resume</a>
                        ${app.linkedinUrl ? `<a href="${escapeHtml(app.linkedinUrl)}" target="_blank" class="application-link">💼 LinkedIn</a>` : ''}
                        ${app.twitterUrl ? `<a href="${escapeHtml(app.twitterUrl)}" target="_blank" class="application-link">🐦 Twitter</a>` : ''}
                    </div>
                    
                    <div class="application-footer">
                        <span>Applied: ${new Date(app.submitted_at).toLocaleDateString()}</span>
                        <span>ID: ${app._id}</span>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `<div class="job-grid">${applicationHTML}</div>`;
        }

        function updateApplicationPagination(page, totalPagesParam) {
            const pagination = document.getElementById('applicationPagination');
            
            if (totalPagesParam <= 1) {
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'flex';
            currentApplicationPage = page;
            totalApplicationPages = totalPagesParam;

            let paginationHTML = '';

            // Previous button
            paginationHTML += `
                <button class="pagination-btn" ${page === 1 ? 'disabled' : ''} onclick="changeApplicationPage(${page - 1})">
                    Previous
                </button>
            `;

            // Page numbers
            for (let i = Math.max(1, page - 2); i <= Math.min(totalPagesParam, page + 2); i++) {
                paginationHTML += `
                    <button class="pagination-btn ${i === page ? 'active' : ''}" onclick="changeApplicationPage(${i})">
                        ${i}
                    </button>
                `;
            }

            // Next button
            paginationHTML += `
                <button class="pagination-btn" ${page === totalPagesParam ? 'disabled' : ''} onclick="changeApplicationPage(${page + 1})">
                    Next
                </button>
            `;

            pagination.innerHTML = paginationHTML;
        }

        function changeApplicationPage(page) {
            if (page >= 1 && page <= totalApplicationPages) {
                currentApplicationPage = page;
                loadApplications();
            }
        }

        function updateApplicationStatus(applicationId, currentStatus) {
            const newStatus = prompt(`Current status: ${currentStatus}\n\nEnter new status (submitted, reviewed, accepted, rejected):`);
            if (!newStatus || newStatus === currentStatus) return;
            
            const validStatuses = ['submitted', 'reviewed', 'accepted', 'rejected'];
            if (!validStatuses.includes(newStatus.toLowerCase())) {
                alert('Invalid status. Must be one of: submitted, reviewed, accepted, rejected');
                return;
            }
            
            const password = prompt('Enter admin password to update application status:');
            if (!password) return;
            
            if (confirm(`Are you sure you want to update the status to "${newStatus}"?`)) {
                fetch(`/api/admin/application/${applicationId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        status: newStatus.toLowerCase(),
                        password: password
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        loadApplications();
                    } else {
                        alert('Error updating application: ' + (data.message || data.error));
                    }
                })
                .catch(error => {
                    alert('Error updating application: ' + error.message);
                });
            }
        }

        function deleteApplication(applicationId) {
            const password = prompt('Enter admin password to delete application:');
            if (!password) return;
            
            if (confirm('Are you sure you want to delete this application? This action cannot be undone.')) {
                fetch(`/api/admin/application/${applicationId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password: password })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        loadApplications();
                    } else {
                        alert('Error deleting application: ' + (data.message || data.error));
                    }
                })
                .catch(error => {
                    alert('Error deleting application: ' + error.message);
                });
            }
        }

        function capitalizeFirst(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        // Close modal when clicking outside
        document.getElementById('jobModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
